name: Archivo de notas del DOF

# Corre el día 1 de cada mes: descarga con `dofjson --archivo` el índice de
# notas del MES ANTERIOR y lo publica como asset `notas-YYYY-MM.tgz` en el
# release `notas-archivo`.
#
# Caso especial (1 de enero): el mes anterior es diciembre, así que en vez de
# un mensual descarga el AÑO completo que acaba de terminar, lo publica como
# `notas-YYYY.tgz` y borra los 12 mensuales de ese año del release.
#
# Ejemplo: el 1 de agosto de 2026 genera `notas-2026-07.tgz` con todas las
# notas del 1 al 31 de julio de 2026. El 1 de enero de 2027 genera
# `notas-2026.tgz` con todo 2026 y elimina `notas-2026-01.tgz` … `-12.tgz`.

on:
  schedule:
    # 09:00 UTC (03:00 en Ciudad de México) del día 1 de cada mes.
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      target_month:
        description: "Mes a archivar en formato YYYY-MM (vacío = mes anterior a hoy). Si el mes es 12, agrupa el año completo."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: notas-archivo
  cancel-in-progress: false

env:
  RELEASE_TAG: notas-archivo

jobs:
  archivo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dofjson
        run: pip install ./packages/dofjson

      - name: Resolve target month
        id: fechas
        run: |
          set -euo pipefail
          MONTH_INPUT="${{ github.event.inputs.target_month }}"
          if [ -n "$MONTH_INPUT" ]; then
            YEAR="${MONTH_INPUT%-*}"
            MONTH="${MONTH_INPUT#*-}"
          else
            # Último día del mes pasado -> su año y mes = mes anterior a hoy.
            PREV=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m)
            YEAR="${PREV%-*}"
            MONTH="${PREV#*-}"
          fi
          echo "year=$YEAR"   >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "Mes objetivo: $YEAR-$MONTH"

      - name: Download and package
        id: paquete
        env:
          YEAR: ${{ steps.fechas.outputs.year }}
          MONTH: ${{ steps.fechas.outputs.month }}
        run: |
          set -euo pipefail
          if [ "$MONTH" = "12" ]; then
            # Agrupar el año completo (se ejecuta el 1 de enero).
            echo "Descargando el año completo $YEAR"
            dofjson --archivo --desde "${YEAR}-01-01" --hasta "${YEAR}-12-31" --outdir notas-archivo
            ASSET="notas-${YEAR}.tgz"
            ( cd notas-archivo && tar czf "../${ASSET}" "${YEAR}" )
            echo "yearly=true" >> "$GITHUB_OUTPUT"
          else
            FIRST="${YEAR}-${MONTH}-01"
            LAST=$(date -u -d "${FIRST} +1 month -1 day" +%Y-%m-%d)
            echo "Descargando ${FIRST} -> ${LAST}"
            dofjson --archivo --desde "$FIRST" --hasta "$LAST" --outdir notas-archivo
            ASSET="notas-${YEAR}-${MONTH}.tgz"
            # Solo los JSON de ese mes: DDMMYYYY-notas.json -> ??MMYYYY-notas.json
            ( cd notas-archivo && tar czf "../${ASSET}" "${YEAR}"/??"${MONTH}${YEAR}"-notas.json )
            echo "yearly=false" >> "$GITHUB_OUTPUT"
          fi
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          ls -lh "$ASSET"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Archivo de notas del DOF" \
              --notes "Índices diarios de notas del DOF generados por el workflow notas-archivo.yml."
          fi

      - name: Upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.paquete.outputs.asset }}
        run: gh release upload "$RELEASE_TAG" "$ASSET" --clobber

      - name: Remove monthly assets for the closed year
        if: steps.paquete.outputs.yearly == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YEAR: ${{ steps.fechas.outputs.year }}
        run: |
          set -euo pipefail
          for MM in 01 02 03 04 05 06 07 08 09 10 11 12; do
            ASSET="notas-${YEAR}-${MM}.tgz"
            if gh release view "$RELEASE_TAG" --json assets \
                 --jq '.assets[].name' | grep -qx "$ASSET"; then
              echo "Borrando $ASSET"
              gh release delete-asset "$RELEASE_TAG" "$ASSET" --yes
            fi
          done
