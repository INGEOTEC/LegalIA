[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nota2md"
version = "0.1.0"
description = "Build the Markdown of a single DOF note (by codNota), from its HTML content or by OCR'ing its scanned page images."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
# dof2md is a sibling package in this monorepo, only needed for the image/PDF
# OCR paths (imported lazily) — kept as an optional extra rather than a hard
# dependency so the HTML-only path stays lightweight.
dependencies = [
    "beautifulsoup4>=4.9",
    "dofjson>=0.1.0",
]

[project.optional-dependencies]
ocr = ["dof2md>=0.1.0"]
test = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/INGEOTEC/LegalIA/tree/main/packages/nota2md"

[project.scripts]
nota2md = "nota2md.cli:main"

[tool.setuptools.packages.find]
include = ["nota2md", "nota2md.*"]
