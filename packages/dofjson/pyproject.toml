[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dofjson"
version = "0.1.1"
description = "Prototype client for SIDOF's undocumented JSON open data service for Mexico's official gazette (DOF)."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
    "requests>=2.31",
    "pypdf>=3.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/INGEOTEC/LegalIA/tree/main/packages/dofjson"

[project.scripts]
dofjson = "dofjson.cli:main"

[tool.setuptools.packages.find]
include = ["dofjson", "dofjson.*"]
