  site-url: https://ingeotec.github.io/LegalIA/
  repo-url: https://github.com/INGEOTEC/LegalIA
  navbar:
    background: "#f9f8f4"
    left:
      - href: index.qmd
        text: Inicio
      - href: exploraciones/titulos.qmd
